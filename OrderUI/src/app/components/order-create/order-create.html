<div class="container">
  <h2>Create New Order</h2>
  
  <form [formGroup]="orderForm" (ngSubmit)="onSubmit()" class="order-form">
    <div class="form-group">
      <label>User Name</label>
      <input formControlName="userName" placeholder="Enter user name">
      @if (orderForm.get('userName')?.touched && orderForm.get('userName')?.invalid) {
        <small class="error">User Name is required (min 3 chars).</small>
      }
    </div>

    <div class="form-group">
      <label>Product Name</label>
      <input formControlName="productName" placeholder="Product UUID or Name">
    </div>

    <div class="row">
      <div class="form-group">
        <label>Quantity</label>
        <input type="number" formControlName="quantity">
      </div>

      <div class="form-group">
        <label>Price per unit</label>
        <input type="number" formControlName="price">
      </div>
    </div>

    <div class="actions">
      <button type="button" routerLink="/orders" class="btn-secondary">Back</button>
      <button type="submit" [disabled]="orderForm.invalid" class="btn-primary">Place Order</button>
    </div>
  </form>
</div>
